 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>adFUZE Contact Form</title>

<style>
body{
    font-family: Arial, Helvetica, sans-serif;
    background:#f5f5f5;
    margin:40px;
}

.webtolead{
    max-width:550px;
    margin:auto;
    background:#ffffff;
    padding:30px;
    border-radius:8px;
    box-shadow:0 2px 10px rgba(0,0,0,.12);
}

.webtolead h2{
    margin-top:0;
    text-align:center;
    color:#333;
}

.webtolead p{
    text-align:center;
    color:#666;
    margin-bottom:30px;
}

.field{
    margin-bottom:18px;
}

.field label{
    display:block;
    margin-bottom:6px;
    font-weight:bold;
    color:#333;
}

.field input,
.field select{
    width:100%;
    padding:10px;
    font-size:14px;
    border:1px solid #ccc;
    border-radius:4px;
    box-sizing:border-box;
}

.submit{
    text-align:center;
    margin-top:25px;
}

.submit input{
    background:#0176d3;
    color:white;
    border:none;
    padding:12px 35px;
    font-size:16px;
    border-radius:4px;
    cursor:pointer;
}

.submit input:hover{
    background:#005fb2;
}
</style>

<script>
function timestamp() {
    var response = document.getElementById("g-recaptcha-response");

    if (response == null || response.value.trim() == "") {
        var elems = JSON.parse(document.getElementsByName("captcha_settings")[0].value);
        elems.ts = JSON.stringify(new Date().getTime());
        document.getElementsByName("captcha_settings")[0].value = JSON.stringify(elems);
    }
}

setInterval(timestamp, 500);
</script>

</head>

<body>

<form class="webtolead"
      action="https://test.salesforce.com/servlet/servlet.WebToLead?encoding=UTF-8&orgId=00DO9000007wKVN"
      method="POST">

    <input type="hidden"
           name="captcha_settings"
           value='{"keyname":"personalKeys","fallback":"true","orgId":"00DO9000007wKVN","ts":""}'>

    <input type="hidden" name="oid" value="00DO9000007wKVN">
    <input type="hidden" name="retURL" value="http://chargefuze.com">

    <input type="hidden"
           id="lead_source"
           name="lead_source"
           value="Website">

    <input type="hidden"
           name="recordType"
           value="012Dn000000vQkeIAE">

    <input type="hidden"
           id="Lead_Category__c"
           name="Lead_Category__c"
           value="Advertising">

    <h2>Contact Us</h2>

    <p>
        Complete the form below and an adFUZE representative will contact you shortly.
    </p>

    <div class="field">
        <label for="first_name">First Name</label>
        <input
            id="first_name"
            name="first_name"
            maxlength="40"
            type="text">
    </div>

    <div class="field">
        <label for="last_name">Last Name</label>
        <input
            id="last_name"
            name="last_name"
            maxlength="80"
            type="text"
            required>
    </div>

    <div class="field">
        <label for="phone">Phone</label>
        <input
            id="phone"
            name="phone"
            maxlength="40"
            type="text">
    </div>

    <div class="field">
        <label for="email">Email</label>
        <input
            id="email"
            name="email"
            maxlength="80"
            type="email"
            required>
    </div>

    <div class="field">
        <label for="company">Company</label>
        <input
            id="company"
            name="company"
            maxlength="40"
            type="text"
            required>
    </div>

    <div class="field">
        <label for="00NPP000003XYsP">
            How do you want to work with adFUZE?
        </label>

        <select
            id="00NPP000003XYsP"
            name="00NPP000003XYsP"
            title="How do you want to work with adFUZE?">

            <option value="">-- Select an option --</option>
            <option value="Direct Advertising">
                Direct Advertising
            </option>
            <option value="Programmatic Advertising">
                Programmatic Advertising
            </option>
            <option value="Sponsorship Opportunities">
                Sponsorship Opportunities
            </option>
            <option value="Other">
                Other
            </option>

        </select>

    </div>

    <div class="field" style="text-align:center;">
        <div class="g-recaptcha"
             data-sitekey="6LfXkPAqAAAAANq320dZoQxGW-tLW7hVAMiI55Aw">
        </div>
    </div>

    <div class="submit">
        <input
            type="submit"
            name="submit"
            value="Submit">
    </div>

</form>

<script src="https://www.google.com/recaptcha/api.js"></script>

</body>

</html>
